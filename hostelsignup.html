<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hostel Signup</title>
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .signup-container{
      background: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    .signup-container h2{
      text-align: center;
      margin-bottom: 25px;
    }
    .signup-container input{
      width: 100%;
      padding: 12px;
      margin: 8px 0 20px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .signup-container input:focus{
      border-color: #4CAF50;
      outline: none;
    }
    .signup-container button{
      width: 100%;
      padding: 12px;
      background-color: #4CAF50;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    .signup-container button:hover{
      background-color: #45a049;
    }
    .error{ color: red; font-size: 13px; margin-bottom: 15px; }
    .success{ color: green; text-align: center; margin-bottom: 15px; }
  </style>
</head>
<body>

<div class="signup-container">
  <h2>Hostel Signup</h2>
  <form id="signupForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required onpaste="return false">
    <div class="error" id="errorMsg"></div>
    <button type="submit">Sign Up</button>
    <div class="success" id="successMsg"></div>
  </form>
</div>

<script>
const form = document.getElementById('signupForm');
const errorMsg = document.getElementById('errorMsg');
const successMsg = document.getElementById('successMsg');

form.addEventListener('submit', function(e){
    e.preventDefault();

    errorMsg.textContent = '';
    successMsg.textContent = '';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();

    if(!username || !password || !confirmPassword){
        errorMsg.textContent = 'All fields are required.';
        return;
    }

    if(password.length < 6){
        errorMsg.textContent = 'Password must be at least 6 characters.';
        return;
    }

    if(password !== confirmPassword){
        errorMsg.textContent = 'Passwords do not match.';
        return;
    }

    // Save credentials in localStorage
    localStorage.setItem('userUsername', username);
    localStorage.setItem('userPassword', password);

    successMsg.textContent = 'Signup successful! Redirecting to login...';

    setTimeout(()=>{
        window.location.href = 'hostellogin.html';
    }, 1000);
});
</script>

</body>
</html>
